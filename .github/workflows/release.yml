name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.2.0 (no v prefix)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Guard version format + unused tag
        run: |
          if ! echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::version '${{ inputs.version }}' is not semver X.Y.Z"
            exit 1
          fi
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Run tests
        run: |
          pip install -r requirements-test.txt
          python -m pytest

      - name: Bump manifest version
        run: |
          jq --arg v "${{ inputs.version }}" '.version = $v' \
            custom_components/coolledx/manifest.json > manifest.tmp
          mv manifest.tmp custom_components/coolledx/manifest.json

      - name: Commit, tag, and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/coolledx/manifest.json
          git commit -m "Release v${{ inputs.version }}"
          git tag -a "v${{ inputs.version }}" -m "v${{ inputs.version }}"
          git push origin HEAD --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes
