# NOTE: The actual service registration (hass.services.async_register calls for
# send_image and send_animation) is wired in __init__.py in a follow-up task.
# This file provides only the UI descriptor schema used by the Home Assistant
# frontend and developer tools to describe the services.

send_image:
  name: Send Image
  description: >-
    Send a still image to the CoolLEDX LED matrix sign. The image is loaded
    from the given local filesystem path and rendered onto the sign's pixel
    grid.
  target:
    entity:
      domain: coolledx
  fields:
    path:
      name: File path
      description: >-
        Local path to an image file (PNG, JPEG, BMP, etc.) accessible by
        Home Assistant. The image will be scaled to fit the sign's pixel
        dimensions.
      required: true
      example: /config/www/my-image.png
      selector:
        text: {}

send_animation:
  name: Send Animation
  description: >-
    Send an animation to the CoolLEDX LED matrix sign. Accepts a .jt
    animation file (native CoolLEDX format) or an animated GIF.
  target:
    entity:
      domain: coolledx
  fields:
    path:
      name: File path
      description: >-
        Local path to a .jt animation or animated GIF file accessible by
        Home Assistant (e.g. /config/www/my-animation.gif).
      required: true
      example: /config/www/my-animation.gif
      selector:
        text: {}

display_text:
  name: Display Text
  description: >-
    Set the message text on the CoolLEDX LED matrix sign, optionally along
    with colour, display mode, scroll speed, brightness, and orientation
    invert, all applied in a single upload.
  target:
    entity:
      domain: coolledx
  fields:
    text:
      name: Text
      description: The message text to display on the sign.
      required: true
      example: Hello world
      selector:
        text: {}
    color:
      name: Color
      description: RGB colour to render the text in.
      required: false
      selector:
        color_rgb: {}
    mode:
      name: Mode
      description: CoolLEDUX display mode to apply before rendering the text.
      required: false
      selector:
        select:
          options:
            - Scroll Left
            - Up
            - Down
            - Accumulate
            - Picture
            - Shining
            - Left Panning
            - Right Panning
            - Cover
            - Left-Right
    speed:
      name: Speed
      description: Scroll speed to apply before rendering the text (0-255).
      required: false
      selector:
        number:
          min: 0
          max: 255
          mode: slider
    brightness:
      name: Brightness
      description: Sign brightness to apply before rendering the text (0-255).
      required: false
      selector:
        number:
          min: 0
          max: 255
          mode: slider
    invert:
      name: Invert
      description: >-
        Rotate the rendered text 180° for this call (does not change the
        device's persisted orientation setting).
      required: false
      selector:
        boolean: {}
